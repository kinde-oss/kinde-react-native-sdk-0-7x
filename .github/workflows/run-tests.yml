name: run-tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up Node.js

              uses: actions/setup-node@v6
            - name: Install dependencies
              run: npm install --legacy-peer-deps # `npm ci` (won't work lock files are .gitignored)

            - name: Run tests
              run: npm test
